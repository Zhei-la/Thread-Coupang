name: 보안 점검

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 보안 점검 실행
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_SECURITY_WEBHOOK }}
          REPO_NAME: ${{ github.repository }}
        run: node -e "
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const SKIP = ['node_modules','.git','dist','build'];
          const EXT = ['.js','.ts','.py','.html','.json'];
          function collect(dir,out=[]){
            try{fs.readdirSync(dir).forEach(e=>{
              if(SKIP.includes(e))return;
              const f=path.join(dir,e);
              try{const s=fs.statSync(f);
                if(s.isDirectory())collect(f,out);
                else if(EXT.some(x=>f.endsWith(x)))out.push(f);
              }catch{}
            });}catch{}return out;
          }
          let code='';
          for(const f of collect('.')){
            try{code+='\n---'+f+'---\n'+fs.readFileSync(f,'utf8');
              if(code.length>10000){code=code.slice(0,10000)+'...';break;}
            }catch{}
          }
          const prompt='보안전문가로서 아래 코드의 취약점을 분석하세요.\n코드:\n'+code+'\n\n반드시 JSON만 응답(마크다운없이):\n{\"overall\":\"safe|warning|danger\",\"summary\":\"요약\",\"critical\":[{\"title\":\"제목\",\"detail\":\"설명\",\"fix\":\"수정\"}],\"warning\":[{\"title\":\"제목\",\"detail\":\"설명\",\"fix\":\"수정\"}],\"passed\":[\"항목\"]}';
          function post(h,p,b,hdrs){return new Promise((res,rej)=>{
            const r=https.request({hostname:h,path:p,method:'POST',headers:hdrs},x=>{
              let d='';x.on('data',c=>d+=c);x.on('end',()=>res(JSON.parse(d)));
            });r.on('error',rej);r.write(b);r.end();
          });}
          (async()=>{
            try{
              const b=JSON.stringify({model:'gpt-4o-mini',max_tokens:1500,messages:[{role:'user',content:prompt}]});
              const r=await post('api.openai.com','/v1/chat/completions',b,{'Content-Type':'application/json','Authorization':'Bearer '+process.env.OPENAI_API_KEY});
              const t=r.choices[0].message.content.replace(/\`\`\`json|\`\`\`/g,'').trim();
              const j=JSON.parse(t);
              const e=j.overall==='danger'?'🚨':j.overall==='warning'?'⚠️':'✅';
              const c=j.overall==='danger'?0xE24B4A:j.overall==='warning'?0xEF9F27:0x639922;
              const fields=[];
              if(j.critical&&j.critical.length)fields.push({name:'🚨 위험',value:j.critical.map(i=>i.title+'\n'+i.detail+'\n수정: '+i.fix).join('\n\n').slice(0,900)});
              if(j.warning&&j.warning.length)fields.push({name:'⚠️ 경고',value:j.warning.map(i=>i.title+'\n'+i.detail+'\n수정: '+i.fix).join('\n\n').slice(0,900)});
              if(j.passed&&j.passed.length)fields.push({name:'✅ 안전',value:j.passed.map(p=>'• '+p).join('\n').slice(0,500)});
              const now=new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
              const wb=JSON.stringify({embeds:[{title:e+' 보안점검 '+process.env.REPO_NAME,description:j.summary,color:c,fields,footer:{text:'점검: '+now}}]});
              const u=new URL(process.env.DISCORD_WEBHOOK);
              await post(u.hostname,u.pathname+u.search,wb,{'Content-Type':'application/json','Content-Length':Buffer.byteLength(wb)});
              console.log('완료');
            }catch(e){console.error(e.message);process.exit(1);}
          })();
          "
